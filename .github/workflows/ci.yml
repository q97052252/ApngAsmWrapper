name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build_test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\ImageGeneratorTool2.slnx

      - name: Build (Release)
        run: dotnet build .\ImageGeneratorTool2.slnx -c Release --no-restore

      - name: Test (Release)
        run: dotnet test .\ImageGeneratorTool2.Tests\ImageGeneratorTool2.Tests.csproj -c Release --no-build -- RunConfiguration.EnvironmentVariables.RUN_APNG_INTEGRATION=1

