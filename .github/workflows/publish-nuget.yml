name: Publish NuGet

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\ImageGeneratorTool2.slnx

      - name: Pack (Release)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(?<ver>\d+\.\d+\.\d+)$') {
            $ver = $Matches['ver']
            dotnet pack .\ApngAsmWrapper\ApngAsmWrapper.csproj -c Release --no-restore /p:Version=$ver
            dotnet pack .\ApngAsmWrapper.ImageSharp\ApngAsmWrapper.ImageSharp.csproj -c Release --no-restore /p:Version=$ver
          } else {
            dotnet pack .\ApngAsmWrapper\ApngAsmWrapper.csproj -c Release --no-restore
            dotnet pack .\ApngAsmWrapper.ImageSharp\ApngAsmWrapper.ImageSharp.csproj -c Release --no-restore
          }

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if (-not $env:NUGET_API_KEY) { throw "Missing GitHub secret: NUGET_API_KEY" }
          dotnet nuget push ".\ApngAsmWrapper\bin\Release\ApngAsmWrapper.*.nupkg" --api-key "$env:NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          dotnet nuget push ".\ApngAsmWrapper.ImageSharp\bin\Release\ApngAsmWrapper.ImageSharp.*.nupkg" --api-key "$env:NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

      - name: Generate changelog (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag "${{ github.ref_name }}" --output CHANGELOG.md

      - name: Create GitHub Release (attach nupkg)
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            ApngAsmWrapper/bin/Release/ApngAsmWrapper.*.nupkg
            ApngAsmWrapper/bin/Release/ApngAsmWrapper.*.snupkg
            ApngAsmWrapper.ImageSharp/bin/Release/ApngAsmWrapper.ImageSharp.*.nupkg
            ApngAsmWrapper.ImageSharp/bin/Release/ApngAsmWrapper.ImageSharp.*.snupkg

