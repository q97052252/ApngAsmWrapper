name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version (e.g. 0.1.6). Used when manually running workflow."
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\ImageGeneratorTool2.slnx

      - name: Build (Release)
        run: dotnet build .\ImageGeneratorTool2.slnx -c Release --no-restore

      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git fetch origin main
          $tagCommit = (git rev-list -n 1 "${{ github.ref_name }}").Trim()
          git merge-base --is-ancestor $tagCommit origin/main

      - name: Test (Release, integration enabled)
        shell: pwsh
        run: dotnet test .\ImageGeneratorTool2.Tests\ImageGeneratorTool2.Tests.csproj -c Release --no-build -- RunConfiguration.EnvironmentVariables.RUN_APNG_INTEGRATION=1

      - name: Pack (Release)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $inputVer = "${{ inputs.version }}"
          $ver = ""
          if ($tag -match '^v(?<v>\d+\.\d+\.\d+)$') { $ver = $Matches['v'] }
          elseif ($inputVer -match '^\d+\.\d+\.\d+$') { $ver = $inputVer }
          else { throw "No version provided. Use a tag vX.Y.Z or workflow_dispatch input 'version'." }

          "PACKAGE_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          dotnet pack .\ApngAsmWrapper\ApngAsmWrapper.csproj -c Release --no-restore /p:Version=$ver
          dotnet pack .\ApngAsmWrapper.ImageSharp\ApngAsmWrapper.ImageSharp.csproj -c Release --no-restore /p:Version=$ver

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if (-not $env:NUGET_API_KEY) { throw "Missing GitHub secret: NUGET_API_KEY" }
          dotnet nuget push ".\ApngAsmWrapper\bin\Release\ApngAsmWrapper.$env:PACKAGE_VERSION.nupkg" --api-key "$env:NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          dotnet nuget push ".\ApngAsmWrapper.ImageSharp\bin\Release\ApngAsmWrapper.ImageSharp.$env:PACKAGE_VERSION.nupkg" --api-key "$env:NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

      - name: Generate changelog (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag "${{ github.ref_name }}" --output CHANGELOG.md

      - name: Create GitHub Release (attach nupkg)
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            ApngAsmWrapper/bin/Release/ApngAsmWrapper.*.nupkg
            ApngAsmWrapper/bin/Release/ApngAsmWrapper.*.snupkg
            ApngAsmWrapper.ImageSharp/bin/Release/ApngAsmWrapper.ImageSharp.*.nupkg
            ApngAsmWrapper.ImageSharp/bin/Release/ApngAsmWrapper.ImageSharp.*.snupkg

